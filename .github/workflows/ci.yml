name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/server/package-lock.json

      - name: Install dependencies
        run: npm --prefix packages/server install

      - name: Lint
        run: npm --prefix packages/server run lint

      - name: Build
        run: npm --prefix packages/server run build

      - name: Test
        run: npm --prefix packages/server test

      # Integration requires a Drupal fixture and is intentionally skipped in CI for now.
